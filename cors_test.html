<!DOCTYPE html>
<html>
<body>
    <h1>CORS Test</h1>
    <button id="testBtn">Test Fetch</button>
    <pre id="output"></pre>
    <script>
        document.getElementById('testBtn').onclick = async () => {
            const out = document.getElementById('output');
            out.textContent = "Testing...";
            try {
                // Testing the exact endpoint with a OPTIONS-triggering request (POST with FormData)
                const formData = new FormData();
                formData.append('file', new Blob(['test'], { type: 'image/png' }), 'test.png');
                
                const response = await fetch("https://voyage-imaging-backend.onrender.com/api/v1/predict", {
                    method: "POST",
                    body: formData
                });
                const json = await response.json();
                out.textContent = JSON.stringify(json, null, 2);
            } catch (err) {
                out.textContent = "Error: " + err.message;
            }
        };
    </script>
</body>
</html>
